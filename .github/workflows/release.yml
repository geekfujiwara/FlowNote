# ============================================================
# FlowNote – Release Pipeline
# Triggers on push to main: ci → build → deploy frontend (SWA) + backend (Functions)
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS                  Service principal JSON
#   AZURE_SUBSCRIPTION_ID              Azure subscription ID
#   AZURE_RESOURCE_GROUP               Resource group name (e.g. rg-flownote)
#   AZURE_FUNCTIONAPP_NAME             Function App name (e.g. flownote-prod-func)
#   AZURE_STORAGE_ACCOUNT_NAME         Storage account name (e.g. flownoteprodst)
#   AZURE_SWA_NAME                     Static Web App name (e.g. flownote-prod-swa)
#   AZURE_FUNCTIONAPP_SCM_USER          SCM basic auth user  (gets.azurewebsites.net/$user)
#   AZURE_FUNCTIONAPP_SCM_PASS          SCM basic auth password
#   AZURE_STATIC_WEB_APPS_API_TOKEN    SWA deploy token (fetched from Azure if AZURE_CREDENTIALS is set)
#   VITE_API_BASE_URL                  Azure Functions URL
#   LOGIN_PASSWORD                     Plain-text login password (hashed to SHA-256 at build time)
#                                      Alternatively set VITE_PASSWORD_HASH to a pre-computed SHA-256 hash.
#
# Optional Secrets:
#   VITE_APPINSIGHTS_CONNECTION_STRING
#   ENTRA_CLIENT_ID                    Entra ID app registration client ID (single source of truth).
#                                      Used by both frontend (as VITE_ENTRA_CLIENT_ID) and backend.
#   VITE_ENTRA_CLIENT_ID               (legacy) Overrides ENTRA_CLIENT_ID for frontend only if set.
#   VITE_MSAL_CLIENT_ID                Legacy alias for VITE_ENTRA_CLIENT_ID (still supported)
#   VITE_MSAL_TENANT_ID                Entra tenant ID (omit to allow any tenant / multi-tenant)
#   VITE_MSAL_REDIRECT_URI             (deprecated) redirect URI override; defaults to window.location.origin
#   ADMIN_EMAILS                       Comma-separated admin email addresses.
#                                      Used by both frontend (as VITE_ADMIN_EMAILS) and backend.
#   VITE_ADMIN_EMAILS                  (legacy) Overrides ADMIN_EMAILS for frontend only if set.
#   ADMIN_DOMAIN                       Allowed email domain for admin access (e.g. microsoft.com).
#                                      Used by both frontend (as VITE_ADMIN_DOMAIN) and backend.
#   AZURE_OPENAI_ENDPOINT              Endpoint URL of an existing Azure OpenAI resource
#   AZURE_OPENAI_DEPLOYMENT_NAME       Model deployment name (e.g. gpt-4o-mini)
#   AZURE_OPENAI_API_VERSION           API version (e.g. 2025-04-01-preview)
#   AZURE_OPENAI_API_KEY               APIM subscription key (omit to use Managed Identity)
#   AZURE_DEPLOYMENT_CONTAINER         Blob container name for FC1 deployment packages (default: deployments)
#   NODE_VERSION                       Node.js version for frontend build (default: 20)
#   PYTHON_VERSION                     Python version for backend build (default: 3.11)
#
# If no Azure secrets are configured the workflow still runs CI (lint + test)
# and builds in mock mode – deploy steps are skipped gracefully.
# ============================================================

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  RESOURCE_GROUP:        ${{ secrets.AZURE_RESOURCE_GROUP }}
  SUBSCRIPTION_ID:       ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  FUNCTION_APP_NAME:     ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
  SWA_NAME:              ${{ secrets.AZURE_SWA_NAME }}
  STORAGE_ACCOUNT_NAME:  ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
  DEPLOYMENT_CONTAINER:  ${{ secrets.AZURE_DEPLOYMENT_CONTAINER || 'deployments' }}
  NODE_VERSION:          ${{ secrets.NODE_VERSION || '20' }}
  PYTHON_VERSION:        ${{ secrets.PYTHON_VERSION || '3.11' }}

# Cancel in-progress runs triggered by the same branch
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────
  # 1. CI – lint + type-check + unit tests
  # ─────────────────────────────────────────────────────────
  ci:
    name: CI (lint · type-check · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --run

  # ─────────────────────────────────────────────────────────
  # 2. Check which deploy secrets are configured
  # ─────────────────────────────────────────────────────────
  check-secrets:
    name: Check deploy secrets
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      has_swa_token:      ${{ steps.chk.outputs.has_swa_token }}
      has_azure_creds:    ${{ steps.chk.outputs.has_azure_creds }}
      has_backend_secrets: ${{ steps.chk.outputs.has_backend_secrets }}
      can_deploy:         ${{ steps.chk.outputs.can_deploy }}
    steps:
      - name: Evaluate secrets
        id: chk
        env:
          SWA_TOKEN:          ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          AZURE_CREDS:        ${{ secrets.AZURE_CREDENTIALS }}
          FUNC_APP_NAME:      ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          RESOURCE_GROUP:     ${{ secrets.AZURE_RESOURCE_GROUP }}
          SUBSCRIPTION_ID:    ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          STORAGE_ACCT_NAME:  ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
        run: |
          HAS_SWA="false"
          HAS_CREDS="false"
          HAS_BACKEND="false"
          CAN_DEPLOY="false"

          # ── Frontend secrets ──
          if [ -n "$SWA_TOKEN" ]; then
            HAS_SWA="true"
            CAN_DEPLOY="true"
            echo "✅  AZURE_STATIC_WEB_APPS_API_TOKEN is set"
          else
            echo "::warning::AZURE_STATIC_WEB_APPS_API_TOKEN is not set"
          fi

          if [ -n "$AZURE_CREDS" ]; then
            HAS_CREDS="true"
            CAN_DEPLOY="true"
            echo "✅  AZURE_CREDENTIALS is set"
          else
            echo "::warning::AZURE_CREDENTIALS is not set – Functions deploy will be skipped"
          fi

          # ── Backend-required secrets ──
          BACKEND_MISSING=()
          if [ -z "$FUNC_APP_NAME" ]; then
            BACKEND_MISSING+=("AZURE_FUNCTIONAPP_NAME")
          else
            echo "✅  AZURE_FUNCTIONAPP_NAME is set ($FUNC_APP_NAME)"
          fi
          if [ -z "$RESOURCE_GROUP" ]; then
            BACKEND_MISSING+=("AZURE_RESOURCE_GROUP")
          else
            echo "✅  AZURE_RESOURCE_GROUP is set ($RESOURCE_GROUP)"
          fi
          if [ -z "$SUBSCRIPTION_ID" ]; then
            BACKEND_MISSING+=("AZURE_SUBSCRIPTION_ID")
          else
            echo "✅  AZURE_SUBSCRIPTION_ID is set"
          fi
          if [ -z "$STORAGE_ACCT_NAME" ]; then
            BACKEND_MISSING+=("AZURE_STORAGE_ACCOUNT_NAME")
          else
            echo "✅  AZURE_STORAGE_ACCOUNT_NAME is set ($STORAGE_ACCT_NAME)"
          fi

          if [ ${#BACKEND_MISSING[@]} -eq 0 ] && [ "$HAS_CREDS" = "true" ]; then
            HAS_BACKEND="true"
            echo "✅  All backend deploy secrets present"
          else
            if [ ${#BACKEND_MISSING[@]} -gt 0 ]; then
              echo "::warning::Missing backend secrets: ${BACKEND_MISSING[*]} – backend deploy will be skipped"
            fi
          fi

          echo "has_swa_token=$HAS_SWA"           >> "$GITHUB_OUTPUT"
          echo "has_azure_creds=$HAS_CREDS"       >> "$GITHUB_OUTPUT"
          echo "has_backend_secrets=$HAS_BACKEND" >> "$GITHUB_OUTPUT"
          echo "can_deploy=$CAN_DEPLOY"           >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────
  # 3. Build frontend
  # ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Compute VITE_PASSWORD_HASH from LOGIN_PASSWORD (plain-text secret) or fall back to
      # a pre-computed VITE_PASSWORD_HASH secret for backward compatibility.
      - name: Compute VITE_PASSWORD_HASH
        if: ${{ needs.check-secrets.outputs.can_deploy == 'true' }}
        env:
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          FALLBACK_HASH:  ${{ secrets.VITE_PASSWORD_HASH }}
        run: |
          if [ -n "$LOGIN_PASSWORD" ]; then
            echo "::add-mask::$LOGIN_PASSWORD"
            HASH=$(printf '%s' "$LOGIN_PASSWORD" | sha256sum | cut -d' ' -f1)
            echo "VITE_PASSWORD_HASH=$HASH" >> "$GITHUB_ENV"
          elif [ -n "$FALLBACK_HASH" ]; then
            echo "VITE_PASSWORD_HASH=$FALLBACK_HASH" >> "$GITHUB_ENV"
          fi

      # Production build (real Azure backend)
      - name: Build – production
        if: ${{ needs.check-secrets.outputs.can_deploy == 'true' }}
        env:
          VITE_USE_MOCK_API:                  'false'
          VITE_USE_MOCK_AGENT:                'false'
          VITE_API_BASE_URL:                  ${{ secrets.VITE_API_BASE_URL }}
          VITE_AGENT_API_BASE_URL:            ${{ secrets.VITE_API_BASE_URL }}
          VITE_PASSWORD_HASH:                 ${{ env.VITE_PASSWORD_HASH }}
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.VITE_APPINSIGHTS_CONNECTION_STRING }}
          # Entra ID SSO – ENTRA_CLIENT_ID is the single source of truth;
          # VITE_ENTRA_CLIENT_ID / VITE_MSAL_CLIENT_ID override if set (legacy compat)
          VITE_ENTRA_CLIENT_ID:               ${{ secrets.VITE_ENTRA_CLIENT_ID || secrets.ENTRA_CLIENT_ID }}
          VITE_MSAL_CLIENT_ID:                ${{ secrets.VITE_MSAL_CLIENT_ID }}
          VITE_MSAL_TENANT_ID:                ${{ secrets.VITE_MSAL_TENANT_ID }}
          VITE_MSAL_REDIRECT_URI:             ${{ secrets.VITE_MSAL_REDIRECT_URI }}
          # Admin emails – ADMIN_EMAILS is the single source of truth;
          # VITE_ADMIN_EMAILS overrides if set (legacy compat)
          VITE_ADMIN_EMAILS:                  ${{ secrets.VITE_ADMIN_EMAILS || secrets.ADMIN_EMAILS }}
          # Admin domain – e.g. microsoft.com; any user with this domain gets admin access
          VITE_ADMIN_DOMAIN:                  ${{ secrets.ADMIN_DOMAIN }}
        run: npm run build

      # Mock build (no Azure infra – artifact still stored for debugging)
      - name: Build – mock mode (infra not provisioned)
        if: ${{ needs.check-secrets.outputs.can_deploy != 'true' }}
        env:
          VITE_USE_MOCK_API:    'true'
          VITE_USE_MOCK_AGENT:  'true'
        run: npm run build

      - name: Upload dist artifact
        if: ${{ needs.check-secrets.outputs.can_deploy == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # 4. Deploy Frontend → Azure Static Web Apps
  # ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Static Web Apps
    runs-on: ubuntu-latest
    needs: [check-secrets, build-frontend]
    if: ${{ needs.check-secrets.outputs.can_deploy == 'true' }}
    continue-on-error: true   # infra may not be provisioned yet

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # Use stored token first
      - name: Set SWA token (from secret)
        if: ${{ needs.check-secrets.outputs.has_swa_token == 'true' }}
        env:
          TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: echo "SWA_DEPLOY_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      # Login with AZURE_CREDENTIALS to fetch a fresh token (overrides above)
      - name: Azure Login
        if: ${{ needs.check-secrets.outputs.has_azure_creds == 'true' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Refresh SWA token via Azure CLI
        if: ${{ needs.check-secrets.outputs.has_azure_creds == 'true' }}
        run: |
          SUBSCRIPTION_ARGS=()
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUBSCRIPTION_ARGS+=(--subscription "${{ env.SUBSCRIPTION_ID }}")
          fi
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ env.SWA_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query "properties.apiKey" \
            --output tsv 2>/dev/null || true)
          if [ -n "$TOKEN" ]; then
            echo "::add-mask::$TOKEN"
            echo "SWA_DEPLOY_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            echo "✅  Fresh SWA token obtained"
          else
            echo "::warning::Could not fetch SWA token from Azure"
          fi

      - name: Assert SWA token exists
        run: |
          if [ -z "${SWA_DEPLOY_TOKEN:-}" ]; then
            echo "::error::No SWA deploy token available. Set AZURE_STATIC_WEB_APPS_API_TOKEN or ensure AZURE_CREDENTIALS has access to '${{ env.SWA_NAME }}'."
            exit 1
          fi

      - name: Deploy to Static Web Apps
        id: swa
        continue-on-error: true
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: ''
          skip_app_build: true

      - name: Azure Logout
        if: always()
        run: az logout 2>/dev/null || true

      - name: Warn on SWA failure
        if: steps.swa.outcome == 'failure'
        run: |
          echo "::warning::SWA deployment failed. If infra is not yet provisioned, run 'Deploy Infrastructure' first."

  # ─────────────────────────────────────────────────────────
  # 5. Deploy Backend → Azure Functions
  # ─────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Azure Functions
    runs-on: ubuntu-latest
    needs: [check-secrets, ci]
    if: ${{ needs.check-secrets.outputs.has_backend_secrets == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python3 -m pip install --no-cache-dir --quiet \
            -r backend/requirements.txt \
            -t backend/.python_packages/lib/site-packages 2>&1 | tail -5

      - name: Package backend
        run: |
          cd backend
          zip -r ../func-package.zip . \
            -x "local.settings.json" \
            -x ".venv/*" \
            -x "venv/*" \
            -x "*/__pycache__/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".env" \
            -x ".env.*" \
            -x "tests/*" \
            -x "*.test.py" \
            -x "e2e-results/*"
          cd ..
          echo "Package size: $(du -h func-package.zip | cut -f1)"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure storage public network access is Enabled for deployment
        # FC1 Flex Consumption deployment requires public network access on the storage
        # account. The deploy step also does this via ARM REST API, but this az CLI
        # attempt provides an early warning if the SP cannot update storage properties.
        id: storage-network
        continue-on-error: true
        run: |
          if [ -z "${{ env.STORAGE_ACCOUNT_NAME }}" ]; then
            echo "::warning::STORAGE_ACCOUNT_NAME is not set – skipping"
            exit 0
          fi
          echo "Attempting to enable storage public network access via az CLI..."
          az storage account update \
            --name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            ${{ env.SUBSCRIPTION_ID && format('--subscription {0}', env.SUBSCRIPTION_ID) || '' }} \
            --public-network-access Enabled \
            --bypass AzureServices Logging Metrics \
            --output none 2>&1 || true
          echo "✅ Storage public network access: Enabled"

      - name: Log storage network result
        if: steps.storage-network.outcome == 'failure'
        run: echo "::warning::Could not enable storage public network access – blob deploy may fail if storage is locked down"

      - name: Ensure Function App managed identity has Storage Blob Data Owner
        # The ARM onedeploy API for FC1 uses the Function App's system-assigned managed identity
        # to upload the deployment zip to the blob container. Without this role the upload returns 403.
        # This step verifies the role exists and creates it (with 90s propagation wait) if absent.
        # continue-on-error: SP may lack permission to read storage/role-assignments; role
        # was already assigned manually and the deployment should succeed regardless.
        continue-on-error: true
        run: |
          SUBSCRIPTION_ARGS=()
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUBSCRIPTION_ARGS+=(--subscription "${{ env.SUBSCRIPTION_ID }}")
          fi
          if [ -z "${{ env.STORAGE_ACCOUNT_NAME }}" ]; then
            echo "::warning::STORAGE_ACCOUNT_NAME is not set – skipping managed identity storage role check"
            exit 0
          fi

          # Get the Function App's managed identity principal ID
          PRINCIPAL_ID=$(az functionapp identity show \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query principalId --output tsv 2>/dev/null || echo "")
          if [ -z "$PRINCIPAL_ID" ]; then
            echo "::warning::Function App has no system-assigned managed identity. Assigning now..."
            PRINCIPAL_ID=$(az functionapp identity assign \
              --name "${{ env.FUNCTION_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              "${SUBSCRIPTION_ARGS[@]}" \
              --query principalId --output tsv)
            if [ -z "$PRINCIPAL_ID" ]; then
              echo "::error::Failed to assign system-assigned managed identity."
              exit 1
            fi
            echo "✅ Managed identity assigned: $PRINCIPAL_ID"
            echo "Waiting 60s for identity propagation..."
            sleep 60
          fi
          echo "Function App principal ID: $PRINCIPAL_ID"

          # Get storage resource ID
          STORAGE_ID=$(az storage account show \
            --name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query id --output tsv)

          # Check if role already exists
          EXISTING=$(az role assignment list \
            --scope "$STORAGE_ID" \
            --assignee "$PRINCIPAL_ID" \
            --role "Storage Blob Data Owner" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query "[0].id" --output tsv 2>/dev/null || echo "")

          if [ -z "$EXISTING" ]; then
            echo "::warning::Storage Blob Data Owner role not found for Function App identity. Creating..."
            az role assignment create \
              --scope "$STORAGE_ID" \
              --assignee "$PRINCIPAL_ID" \
              --role "Storage Blob Data Owner" \
              "${SUBSCRIPTION_ARGS[@]}"
            echo "Role created. Waiting 90s for RBAC propagation..."
            sleep 90
          else
            echo "✅ Storage Blob Data Owner role exists for Function App identity."
          fi

      - name: Deploy to Azure Functions
        # Flex Consumption (FC1): deploy via SCM Basic Auth (pre-stored credentials).
        # This bypasses SP RBAC entirely – the SCM service uses the Function App's
        # own identity for blob storage access.
        # Priority: 1) dedicated SCM secrets  2) publishing credentials via az CLI
        env:
          SCM_USER: ${{ secrets.AZURE_FUNCTIONAPP_SCM_USER }}
          SCM_PASS: ${{ secrets.AZURE_FUNCTIONAPP_SCM_PASS }}
        run: |
          set -uo pipefail
          # Trim whitespace/newlines from secret values
          FA="$(echo -n "${{ env.FUNCTION_APP_NAME }}" | tr -d '[:space:]')"
          RG="$(echo -n "${{ env.RESOURCE_GROUP }}" | tr -d '[:space:]')"
          SUB="$(echo -n "${{ env.SUBSCRIPTION_ID }}" | tr -d '[:space:]')"

          echo "Function App name length: ${#FA}"
          # Debug: show hex of first 4 and last 4 chars to detect corruption
          echo "FA first4: $(echo -n "$FA" | head -c4 | xxd -p)"
          echo "FA last4:  $(echo -n "$FA" | tail -c4 | xxd -p)"

          # Construct SCM host; also prepare Bicep-derived fallback
          SCM_HOST="${FA}.scm.azurewebsites.net"
          BICEP_FA="flownote-prod-func"
          BICEP_SCM_HOST="${BICEP_FA}.scm.azurewebsites.net"

          echo "Constructed SCM host: ${SCM_HOST}"
          echo "Bicep-derived SCM host: ${BICEP_SCM_HOST}"
          echo "Package size: $(du -h func-package.zip | cut -f1)"

          # ── Resolve SCM credentials ──
          AUTH_USER=""
          AUTH_PASS=""

          # Method A: dedicated SCM secrets
          if [ -n "${SCM_USER:-}" ] && [ -n "${SCM_PASS:-}" ]; then
            AUTH_USER="$SCM_USER"
            AUTH_PASS="$SCM_PASS"
            echo "✅ Using dedicated SCM credentials from secrets"
          else
            # Method B: fetch publishing credentials via az CLI
            echo "SCM secrets not set – fetching publishing credentials from Azure..."
            CREDS_JSON=""
            if CREDS_JSON=$(az functionapp deployment list-publishing-credentials \
              --resource-group "$RG" --name "$FA" --subscription "$SUB" \
              --output json 2>/dev/null); then
              AUTH_USER=$(echo "$CREDS_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('publishingUserName',''))" 2>/dev/null || echo "")
              AUTH_PASS=$(echo "$CREDS_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('publishingPassword',''))" 2>/dev/null || echo "")
              if [ -n "$AUTH_USER" ] && [ -n "$AUTH_PASS" ]; then
                echo "✅ Publishing credentials fetched via az CLI"
              fi
            fi
          fi

          if [ -z "$AUTH_USER" ] || [ -z "$AUTH_PASS" ]; then
            echo "::error::No SCM credentials available."
            exit 1
          fi

          echo "::add-mask::$AUTH_USER"
          echo "::add-mask::$AUTH_PASS"

          # ── DNS resolution: try constructed hostname, fall back to Bicep name ──
          echo "=== DNS Resolution ==="
          FINAL_SCM_HOST=""
          RESOLVED_IP=""
          set +e
          for TRY_HOST in "$SCM_HOST" "$BICEP_SCM_HOST"; do
            echo "Trying DNS for: ${TRY_HOST}..."
            # Use dig with Google DNS for reliable cross-region resolution
            IP=""
            if command -v dig &>/dev/null; then
              IP=$(dig +short @8.8.8.8 "${TRY_HOST}" A 2>/dev/null | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            fi
            if [ -z "$IP" ]; then
              # Fallback: nslookup against Google DNS, parse answer section only
              IP=$(nslookup "${TRY_HOST}" 8.8.8.8 2>/dev/null | awk '/^Address:/ && !/8\.8\.8\.8/ && !/#/ {gsub(/^Address:[[:space:]]+/,""); print}' | head -1)
            fi
            if [ -n "$IP" ] && [ "$IP" != "8.8.8.8" ] && [ "$IP" != "8.8.4.4" ]; then
              echo "✅ ${TRY_HOST} → ${IP}"
              FINAL_SCM_HOST="$TRY_HOST"
              RESOLVED_IP="$IP"
              break
            else
              echo "❌ ${TRY_HOST} did not resolve (IP=${IP:-empty})"
            fi
          done
          set -e

          # If no DNS resolution at all, use Bicep-derived hostname without --resolve
          if [ -z "$FINAL_SCM_HOST" ]; then
            echo "::warning::DNS resolution failed for all hostnames. Trying curl with Bicep hostname..."
            FINAL_SCM_HOST="$BICEP_SCM_HOST"
            RESOLVED_IP=""
          fi

          # Build curl resolve flag
          RESOLVE_FLAG=""
          if [ -n "${RESOLVED_IP:-}" ]; then
            RESOLVE_FLAG="--resolve ${FINAL_SCM_HOST}:443:${RESOLVED_IP}"
            echo "Using --resolve ${FINAL_SCM_HOST}:443:${RESOLVED_IP}"
          fi

          # ── Deploy via SCM /api/publish ──
          DEPLOY_URL="https://${FINAL_SCM_HOST}/api/publish?type=zip&RemoteBuild=false"
          echo "Deploying to: ${DEPLOY_URL}"

          set +e
          HTTP_STATUS=$(curl -sS -o /tmp/deploy-response.json -w "%{http_code}" \
            ${RESOLVE_FLAG} \
            -X POST "$DEPLOY_URL" \
            -u "${AUTH_USER}:${AUTH_PASS}" \
            -H "Content-Type: application/zip" \
            --connect-timeout 30 \
            --max-time 600 \
            --retry 2 --retry-delay 10 --retry-connrefused \
            --data-binary @func-package.zip)
          CURL_EXIT=$?
          set -e

          if [ $CURL_EXIT -ne 0 ]; then
            echo "::warning::curl /api/publish exited with code $CURL_EXIT"
            echo "Trying /api/zipdeploy endpoint as fallback..."
            DEPLOY_URL2="https://${FINAL_SCM_HOST}/api/zipdeploy?isAsync=false"
            set +e
            HTTP_STATUS=$(curl -sS -o /tmp/deploy-response.json -w "%{http_code}" \
              ${RESOLVE_FLAG} \
              -X POST "$DEPLOY_URL2" \
              -u "${AUTH_USER}:${AUTH_PASS}" \
              -H "Content-Type: application/octet-stream" \
              --connect-timeout 30 \
              --max-time 600 \
              --retry 2 --retry-delay 10 --retry-connrefused \
              --data-binary @func-package.zip)
            CURL_EXIT=$?
            set -e
            if [ $CURL_EXIT -ne 0 ]; then
              echo "::error::curl failed (exit $CURL_EXIT). HOST=${FINAL_SCM_HOST} FA_LEN=${#FA} IP=${RESOLVED_IP:-none}"
              exit 1
            fi
          fi

          echo "HTTP Response: $HTTP_STATUS"
          cat /tmp/deploy-response.json 2>/dev/null || true

          if [[ "$HTTP_STATUS" =~ ^2 ]]; then
            echo "✅ Deployment succeeded (HTTP $HTTP_STATUS)"
          else
            echo "::error::Deployment failed (HTTP $HTTP_STATUS)"
            cat /tmp/deploy-response.json 2>/dev/null || true
            exit 1
          fi

      - name: Configure Function App CORS
        # Ensure CORS wildcard is set on the deployed Function App on every release.
        # The siteConfig.cors from Bicep is only applied when the infra workflow runs;
        # this step guarantees the setting is always current after a code-only deploy.
        # Both platform CORS (this step) and in-code CORS headers (_CORS_HEADERS in
        # function_app.py) are kept as defense-in-depth: platform handles preflight
        # during cold starts; code handles it for subsequent warm requests.
        # continue-on-error: SP may temporarily lack Microsoft.Web/sites/config/read;
        # CORS wildcard is pre-configured and code also sets CORS headers.
        continue-on-error: true
        run: |
          SUBSCRIPTION_ARGS=()
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUBSCRIPTION_ARGS+=(--subscription "${{ env.SUBSCRIPTION_ID }}")
          fi
          # Add wildcard CORS origin (idempotent – safe to re-run)
          az functionapp cors add \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --allowed-origins '*'
          echo "✅ CORS configured: allowed-origins = *"

          # Verify
          ORIGINS=$(az functionapp cors show \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query "allowedOrigins" --output tsv 2>/dev/null || true)
          echo "Current allowed origins: $ORIGINS"

      - name: Configure Azure OpenAI and Entra ID app settings
        # Sets all required Function App environment variables using ARM REST API directly.
        # NOTE: 'az functionapp config appsettings set' fails on Flex Consumption plans.
        # NOTE: GET /config/appsettings/list may return empty in CI (network restrictions),
        #       so we enumerate ALL required settings explicitly to avoid silent wipeout.
        continue-on-error: true
        env:
          OAI_ENDPOINT:             ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          OAI_DEPLOYMENT:           ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          OAI_API_VERSION:          ${{ secrets.AZURE_OPENAI_API_VERSION }}
          OAI_API_KEY:              ${{ secrets.AZURE_OPENAI_API_KEY }}
          ENTRA_CLIENT_ID:          ${{ secrets.ENTRA_CLIENT_ID }}
          ADMIN_EMAILS:             ${{ secrets.ADMIN_EMAILS }}
          ADMIN_DOMAIN:             ${{ secrets.ADMIN_DOMAIN }}
          AI_WORKSPACE_ID:          ${{ secrets.APPINSIGHTS_WORKSPACE_ID }}
        run: |
          TOKEN=$(az account get-access-token --query accessToken -o tsv)
          SUB="${{ env.SUBSCRIPTION_ID }}"
          RG="${{ env.RESOURCE_GROUP }}"
          FA="${{ env.FUNCTION_APP_NAME }}"
          # Use AZURE_STORAGE_ACCOUNT_NAME secret when set; fall back to name derived
          # from Function App name convention: <prefix><env>st (e.g. flownote-prod-func → flownoteprodst)
          if [ -n "${{ env.STORAGE_ACCOUNT_NAME }}" ]; then
            SA_NAME="${{ env.STORAGE_ACCOUNT_NAME }}"
          else
            SA_NAME=$(echo "${FA}" | sed 's/-func$//' | tr -d '-' | cut -c1-22)st
          fi
          echo "Storage account name: $SA_NAME"
          # Derive App Insights name: <prefix>-<env>-appi
          APPI_NAME=$(echo "${FA}" | sed 's/-func$/-appi/')
          AI_CONN=$(az monitor app-insights component show \
            --app "$APPI_NAME" \
            --resource-group "$RG" \
            --subscription "$SUB" \
            --query connectionString -o tsv 2>/dev/null || echo "")
          echo "App Insights conn string obtained: $([ -n "$AI_CONN" ] && echo 'yes' || echo 'no')"
          # Merge all settings (Bicep-managed + CI-managed) into one PUT
          PATCH=$(python3 -c "import json,os; sa=os.environ.get('SA_NAME',''); ai=os.environ.get('AI_CONN',''); p={'AzureWebJobsStorage__accountName':sa,'APPLICATIONINSIGHTS_CONNECTION_STRING':ai,'APPINSIGHTS_WORKSPACE_ID':os.environ.get('AI_WORKSPACE_ID',''),'STORAGE_ACCOUNT_URL':'https://'+sa+'.blob.core.windows.net/','NOTES_CONTAINER':'notes','AZURE_OPENAI_ENDPOINT':os.environ.get('OAI_ENDPOINT',''),'AZURE_OPENAI_DEPLOYMENT_NAME':os.environ.get('OAI_DEPLOYMENT',''),'AZURE_OPENAI_API_VERSION':os.environ.get('OAI_API_VERSION',''),'AZURE_OPENAI_API_KEY':os.environ.get('OAI_API_KEY',''),'ENTRA_CLIENT_ID':os.environ.get('ENTRA_CLIENT_ID',''),'ADMIN_EMAILS':os.environ.get('ADMIN_EMAILS',''),'ADMIN_DOMAIN':os.environ.get('ADMIN_DOMAIN',''),'OTEL_SDK_DISABLED':'true'}; p={k:v for k,v in p.items() if v}; print(json.dumps({'properties':p}))" SA_NAME="$SA_NAME" AI_CONN="$AI_CONN")
          PUT_URI="https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${FA}/config/appsettings?api-version=2022-03-01"
          RESULT=$(curl -s -X PUT "$PUT_URI" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PATCH")
          echo "Appsettings PUT result keys: $(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(sorted(d.get('properties',{}).keys()))" 2>/dev/null || echo "parse error: $RESULT")"

      - name: Verify Azure OpenAI app settings
        # continue-on-error: RBAC may still be propagating after SP Contributor assignment.
        continue-on-error: true
        run: |
          SUBSCRIPTION_ARGS=()
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUBSCRIPTION_ARGS+=(--subscription "${{ env.SUBSCRIPTION_ID }}")
          fi
          ENDPOINT=$(az functionapp config appsettings list \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query "[?name=='AZURE_OPENAI_ENDPOINT'].value | [0]" \
            --output tsv 2>/dev/null || true)
          DEPLOYMENT=$(az functionapp config appsettings list \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query "[?name=='AZURE_OPENAI_DEPLOYMENT_NAME'].value | [0]" \
            --output tsv 2>/dev/null || true)
          API_VER=$(az functionapp config appsettings list \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query "[?name=='AZURE_OPENAI_API_VERSION'].value | [0]" \
            --output tsv 2>/dev/null || true)

          echo "## Azure OpenAI Configuration" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$ENDPOINT" ]; then
            echo "::warning::AZURE_OPENAI_ENDPOINT is empty – agent will fail with 404"
          else
            MASKED=$(echo "$ENDPOINT" | sed 's|^\(https\{0,1\}://[^/]*\).*|\1|')
            echo "✅  AZURE_OPENAI_ENDPOINT is set ($MASKED/...)"
          fi
          if [ -z "$DEPLOYMENT" ]; then
            echo "::warning::AZURE_OPENAI_DEPLOYMENT_NAME is empty – agent will fail with 404"
          else
            echo "✅  AZURE_OPENAI_DEPLOYMENT_NAME = $DEPLOYMENT"
          fi
          if [ -z "$API_VER" ]; then
            echo "::warning::AZURE_OPENAI_API_VERSION is empty – using backend default"
          else
            echo "✅  AZURE_OPENAI_API_VERSION = $API_VER"
          fi

      - name: Azure Logout
        if: always()
        run: az logout

  # ─────────────────────────────────────────────────────────
  # 6. Summary
  # ─────────────────────────────────────────────────────────
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [ci, build-frontend, deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Print result
        env:
          CI_RESULT:       ${{ needs.ci.result }}
          BUILD_RESULT:    ${{ needs.build-frontend.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          BACKEND_RESULT:  ${{ needs.deploy-backend.result }}
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CI (lint + test) | $CI_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Frontend   | $BUILD_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy Frontend  | ${FRONTEND_RESULT:-skipped} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy Backend   | ${BACKEND_RESULT:-skipped} |" >> "$GITHUB_STEP_SUMMARY"
