# ============================================================
# FlowNote – Storage Network Access Schedule
#
# スケジュール (JST):
#   04:00 (19:00 UTC) → Enabled に復元（業務開始前）
#   21:00 (12:00 UTC) → Disabled に設定
#
# Required Secrets:
#   AZURE_CREDENTIALS     – Service principal JSON (clientId, clientSecret, tenantId, subscriptionId)
#   AZURE_SUBSCRIPTION_ID – Azure subscription ID
#   AZURE_RESOURCE_GROUP  – Resource group name (e.g. rg-flownote)
# ============================================================
name: Storage Network Access Schedule

on:
  schedule:
    - cron: '0 19 * * *'  # 04:00 JST → Enabled
    - cron: '0 12 * * *'  # 21:00 JST → Disabled
  workflow_dispatch:
    inputs:
      action:
        description: '実行するアクション'
        required: true
        default: 'enable'
        type: choice
        options:
          - enable
          - disable

env:
  RESOURCE_GROUP:       ${{ secrets.AZURE_RESOURCE_GROUP }}
  SUBSCRIPTION_ID:      ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # Storage account name mirrors Bicep: take(replace('${prefix}${environment}st','-',''),24)
  # prefix=flownote, environment=prod → flownoteprodst
  STORAGE_ACCOUNT_NAME: flownoteprodst

jobs:
  manage-network-access:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            echo "target=disable" >> $GITHUB_OUTPUT
          else
            echo "target=enable" >> $GITHUB_OUTPUT
          fi

      - name: Enable storage network access (04:00 JST)
        if: steps.action.outputs.target == 'enable'
        run: |
          echo "▶ publicNetworkAccess=Enabled に設定します..."
          az storage account update \
            --name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --public-network-access Enabled \
            --default-action Allow
          echo "✓ 完了"

      - name: Disable storage network access (21:00 JST)
        if: steps.action.outputs.target == 'disable'
        run: |
          echo "▶ publicNetworkAccess=Disabled に設定します..."
          az storage account update \
            --name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --public-network-access Disabled \
            --default-action Deny
          echo "✓ 完了"

      - name: Verify settings
        run: |
          az storage account show \
            --name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "{publicNetworkAccess:publicNetworkAccess, defaultAction:networkRuleSet.defaultAction}" \
            -o table
