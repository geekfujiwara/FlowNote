name: Delete merged branch

on:
  pull_request:
    types:
      - closed

jobs:
  delete-branch:
    name: Delete head branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
    steps:
      - name: Delete head branch
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.ref;

            // Do not delete the default branch
            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            if (ref === repoData.default_branch) {
              core.info(`Skipping default branch: ${ref}`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${ref}`,
              });
              core.info(`Deleted branch: ${ref}`);
            } catch (err) {
              if (err.status === 422 && err.message && err.message.includes('Reference does not exist')) {
                core.info(`Branch already deleted: ${ref}`);
              } else {
                throw err;
              }
            }
