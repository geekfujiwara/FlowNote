# ============================================================
# FlowNote – Infrastructure Deployment Pipeline
# Deploys infra/main.bicep to Azure and ensures the GitHub
# Actions service principal has the roles it needs on the
# Function App (Website Contributor → includes
# Microsoft.Web/sites/config/read for CORS / appsettings).
#
# Required GitHub Secrets (same as release.yml):
#   AZURE_CREDENTIALS          Service principal JSON
#   AZURE_SUBSCRIPTION_ID      Azure subscription ID
#   AZURE_RESOURCE_GROUP       Resource group name
#   AZURE_FUNCTIONAPP_NAME     Function App name
#   AZURE_STORAGE_ACCOUNT_NAME Storage account name
#
# Optional GitHub Secrets (override Bicep parameter defaults):
#   AZURE_OPENAI_ENDPOINT          Azure OpenAI / APIM gateway endpoint URL
#   AZURE_OPENAI_DEPLOYMENT_NAME   Model deployment name
#   AZURE_OPENAI_MODEL_NAME        Model name
#   AZURE_OPENAI_MODEL_VERSION     Model version
#
# Run manually from Actions → "Deploy Infrastructure" → Run workflow.
# ============================================================

name: Deploy Infrastructure

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP:       ${{ secrets.AZURE_RESOURCE_GROUP }}
  SUBSCRIPTION_ID:      ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  FUNCTION_APP_NAME:    ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
  STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-infra:
    name: Deploy Bicep + Grant SP Permissions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 1. Deploy Bicep template ───────────────────────────
      - name: Deploy infra/main.bicep
        env:
          OAI_ENDPOINT:      ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          OAI_DEPLOYMENT:    ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          OAI_MODEL_NAME:    ${{ secrets.AZURE_OPENAI_MODEL_NAME }}
          OAI_MODEL_VERSION: ${{ secrets.AZURE_OPENAI_MODEL_VERSION }}
        run: |
          SUBSCRIPTION_ARGS=()
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUBSCRIPTION_ARGS+=(--subscription "${{ env.SUBSCRIPTION_ID }}")
          fi
          # Build optional Bicep parameter overrides from secrets
          PARAMS=()
          [ -n "$OAI_ENDPOINT" ]      && PARAMS+=(azureOpenAiEndpointOverride="$OAI_ENDPOINT")
          [ -n "$OAI_DEPLOYMENT" ]    && PARAMS+=(azureOpenAiDeploymentName="$OAI_DEPLOYMENT")
          [ -n "$OAI_MODEL_NAME" ]    && PARAMS+=(azureOpenAiModelName="$OAI_MODEL_NAME")
          [ -n "$OAI_MODEL_VERSION" ] && PARAMS+=(azureOpenAiModelVersion="$OAI_MODEL_VERSION")
          PARAM_ARGS=()
          for p in "${PARAMS[@]}"; do PARAM_ARGS+=(--parameters "$p"); done
          az deployment group create \
            "${SUBSCRIPTION_ARGS[@]}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --mode Incremental \
            "${PARAM_ARGS[@]}" \
            --output table
          echo "✅ Bicep deployment completed"

      # ── 2. Grant GitHub Actions SP: Website Contributor ────
      # Website Contributor (de139f84-1756-47ae-9be6-808fbbe84772)
      # includes Microsoft.Web/sites/config/read which is required by
      #   az functionapp cors add/show
      #   az functionapp config appsettings list
      # in the release pipeline.
      # Idempotent – safe to re-run; existing assignments are left as-is.
      - name: Grant SP Website Contributor on Function App
        continue-on-error: true
        env:
          AZURE_CREDS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          # Derive SP object ID from the AZURE_CREDENTIALS clientId (via env var – never echoed)
          CLIENT_ID=$(echo "$AZURE_CREDS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['clientId'])")
          echo "::add-mask::$CLIENT_ID"
          SP_OID=$(az ad sp show --id "$CLIENT_ID" --query id --output tsv 2>/dev/null || echo "")

          if [ -z "$SP_OID" ]; then
            echo "::warning::Could not resolve SP object ID from AZURE_CREDENTIALS – skipping role assignment"
            exit 0
          fi
          echo "SP object ID: $SP_OID"

          SUBSCRIPTION_ARGS=()
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUBSCRIPTION_ARGS+=(--subscription "${{ env.SUBSCRIPTION_ID }}")
          fi

          # Derive subscription ID: prefer env var, fall back to current account.
          # Constructing the ARM resource ID directly avoids the chicken-and-egg where
          # az functionapp show requires Microsoft.Web/sites/read – which the SP may not
          # have yet (it's the very permission we are about to grant here).
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUB_ID="${{ env.SUBSCRIPTION_ID }}"
          else
            SUB_ID=$(az account show --query id -o tsv)
          fi
          FUNC_ID="/subscriptions/${SUB_ID}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.FUNCTION_APP_NAME }}"
          echo "Function App resource ID: $FUNC_ID"

          WEBSITE_CONTRIBUTOR="de139f84-1756-47ae-9be6-808fbbe84772"

          # Check if role already assigned
          EXISTING=$(az role assignment list \
            --scope "$FUNC_ID" \
            --assignee "$SP_OID" \
            --role "$WEBSITE_CONTRIBUTOR" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query "[0].id" --output tsv 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "✅ Website Contributor already assigned to SP on Function App"
          else
            az role assignment create \
              --scope "$FUNC_ID" \
              --assignee-object-id "$SP_OID" \
              --assignee-principal-type ServicePrincipal \
              --role "$WEBSITE_CONTRIBUTOR" \
              "${SUBSCRIPTION_ARGS[@]}"
            echo "✅ Website Contributor granted to SP on Function App"
            echo "Waiting 60s for RBAC propagation..."
            sleep 60
          fi

      # ── 3. Grant GitHub Actions SP: Storage Account Contributor ──
      # Required by storage-network-schedule.yml (nightly enable/disable)
      # and release.yml's "Ensure storage public network access is Enabled" step.
      # Without this the SP gets AuthorizationFailed on storageAccounts/read|write.
      - name: Grant SP Storage Account Contributor on Storage Account
        continue-on-error: true
        env:
          AZURE_CREDS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          CLIENT_ID=$(echo "$AZURE_CREDS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['clientId'])")
          echo "::add-mask::$CLIENT_ID"
          SP_OID=$(az ad sp show --id "$CLIENT_ID" --query id --output tsv 2>/dev/null || echo "")

          if [ -z "$SP_OID" ]; then
            echo "::warning::Could not resolve SP object ID – skipping Storage Account Contributor assignment"
            exit 0
          fi

          if [ -z "${{ env.STORAGE_ACCOUNT_NAME }}" ]; then
            echo "::warning::STORAGE_ACCOUNT_NAME is not set – skipping Storage Account Contributor assignment"
            exit 0
          fi

          SUBSCRIPTION_ARGS=()
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUBSCRIPTION_ARGS+=(--subscription "${{ env.SUBSCRIPTION_ID }}")
          fi

          # Construct ARM resource ID directly to avoid needing read access to look up the resource.
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUB_ID="${{ env.SUBSCRIPTION_ID }}"
          else
            SUB_ID=$(az account show --query id -o tsv)
          fi
          STORAGE_ID="/subscriptions/${SUB_ID}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Storage/storageAccounts/${{ env.STORAGE_ACCOUNT_NAME }}"
          echo "Storage account resource ID: $STORAGE_ID"

          STORAGE_CONTRIB="17d1049b-9a84-46fb-8f53-869881c3d3ab"

          EXISTING=$(az role assignment list \
            --scope "$STORAGE_ID" \
            --assignee "$SP_OID" \
            --role "$STORAGE_CONTRIB" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query "[0].id" --output tsv 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "✅ Storage Account Contributor already assigned to SP"
          else
            az role assignment create \
              --scope "$STORAGE_ID" \
              --assignee-object-id "$SP_OID" \
              --assignee-principal-type ServicePrincipal \
              --role "$STORAGE_CONTRIB" \
              "${SUBSCRIPTION_ARGS[@]}"
            echo "✅ Storage Account Contributor granted to SP"
          fi

      # ── 4. Verify SP can read Function App config ──────────
      - name: Verify SP has sites/config/read
        continue-on-error: true
        run: |
          SUBSCRIPTION_ARGS=()
          if [ -n "${{ env.SUBSCRIPTION_ID }}" ]; then
            SUBSCRIPTION_ARGS+=(--subscription "${{ env.SUBSCRIPTION_ID }}")
          fi
          CORS=$(az functionapp cors show \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            "${SUBSCRIPTION_ARGS[@]}" \
            --query allowedOrigins --output tsv 2>/dev/null || echo "")
          if [ -n "$CORS" ]; then
            echo "✅ SP can read Function App config. Allowed origins: $CORS"
          else
            echo "::warning::Could not verify CORS – either no origins are set or permission not yet propagated"
          fi

      - name: Azure Logout
        if: always()
        run: az logout 2>/dev/null || true
